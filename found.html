<!DOCTYPE html>
<html>
<head>
    <title>Found Item</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="navbar">
    <h1>Lost & Found Portal</h1>
    <p id="greeting"></p>
</div>

<div class="container">
    <form id="foundForm" class="container">

    <h2>Report Found Item</h2>

    <input type="text" id="foundItem" placeholder="Item Name" required>

    <select id="foundCategory" required>
        <option value="">Select Category</option>
        <option>Electronics</option>
        <option>Stationery</option>
        <option>ID/Cards</option>
        <option>Clothing</option>
        <option>Bags</option>
        <option>Keys</option>
        <option>Accessories</option>
        <option>Other</option>
    </select>

    <textarea id="foundDesc"
        placeholder="🌟 A photo helps the owner verify the item. Keep it safe."
        required></textarea>

    <input type="text" id="foundLocation" placeholder="Found At Location" required>

    <input type="date" id="foundDate" required>

    <input type="tel" id="foundPhone" maxlength="10"
        placeholder="Contact Number (10 digits)" required>

    <div class="file-row">
        <input type="file" id="foundImage">
        <span>Upload photo</span>
    </div>

    <!-- IMPORTANT: type="button" -->
    <button type="button" onclick="submitFound()">Submit</button>

</form>

<script src="script.js"></script>
</body>
</html>
