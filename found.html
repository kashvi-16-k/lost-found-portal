<!DOCTYPE html>
<html>
<head>
    <title>Found Item</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="navbar">
    <h1>Lost & Found Portal</h1>
    <p id="greeting"></p>
</div>

<div class="container">
    <h2>Report Found Item</h2>

    <input type="text" id="foundItem" placeholder="Item Name">

    <select>
        <option>Select Category</option>
        <option>Electronics</option>
        <option>Stationery</option>
        <option>ID/Cards</option>
        <option>Clothing</option>
        <option>Bags</option>
        <option>Keys</option>
        <option>Accessories</option>
        <option>Other</option>
    </select>

    <textarea id="foundDesc" placeholder="🌟 A photo helps the owner verify the item. Keep it safe."></textarea>

    <input type="text" placeholder="Found At Location">
    <input type="date">
    <input type="tel" placeholder="Contact Number">

    <div class="file-row">
        <input type="file">
        <span>Upload photo</span>
    </div>

    <button onclick="submitFound()">Submit</button>
</div>

<script src="script.js"></script>
</body>
</html>
