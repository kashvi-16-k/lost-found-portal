<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Lost &amp; Found Portal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="navbar">
        <h1>Lost &amp; Found Portal</h1>
        <div class="right-section">
            <p id="greeting"></p>
            <button onclick="localStorage.removeItem('user'); location.href='login.html';">Logout</button>
        </div>
    </div>

    <div class="page-shell">
        <div class="welcome-box">
            <h2 id="welcomeText">Welcome back, Student</h2>
            <p>View lost and found items reported on campus.</p>
        </div>

        <div class="top-controls two-column-controls">
            <input type="text" id="searchInput" placeholder="Search lost items...">

            <select id="filterSelect">
                <option value="All">All Items</option>
                <option value="Lost">Lost Items</option>
                <option value="Found">Found Items</option>
            </select>
        </div>

        <div class="actions">
            <button onclick="location.href='lost.html'">Lost an Item</button>
            <button onclick="location.href='found.html'">Found an Item</button>
            <button onclick="location.href='activity.html'">My Activity</button>
        </div>

        <div class="cards-container" id="dashboardCards"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
