<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="navbar">
    <h1>Lost & Found Portal</h1>
    <p id="greeting"></p>
</div>

<div class="cards-container">

    <div class="card">
        <img src="bottle.jpg" alt="Bottle">
        <h3>Blue Bottle</h3>
        <p>Lost at CL 603</p>
    </div>

    <div class="card">
        <img src="keychain.jpg" alt="Keychain">
        <h3>Keychain</h3>
        <p>Lost at Room 101</p>
    </div>

    <div class="card">
        <img src="wallet.jpg" alt="Wallet">
        <h3>Wallet</h3>
        <p>Lost at Library</p>
    </div>

    <div class="card">
        <img src="card.jpg" alt="Bag">
        <h3>ID card</h3>
        <p>Lost at Cafeteria</p>
    </div>

</div>

<div class="actions">
    <button onclick="location.href='lost.html'">Lost an Item</button>
    <button onclick="location.href='found.html'">Found an Item</button>
    <button onclick="location.href='activity.html'">My Activity</button>
</div>

<script src="script.js"></script>
</body>
</html>
