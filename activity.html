<!DOCTYPE html>
<html>
<head>
    <title>My Activity</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<!-- NAVBAR -->
<div class="navbar">
    <h1>Lost & Found Portal</h1>
    <p>Hi, User</p>
</div>

<!-- MAIN CONTAINER -->
<div class="account-wrapper">

    <!-- PROFILE CARD -->
    <div class="profile-card">
        <div>
            <h2>K</h2>
            <p>SAP ID: 123456</p>
        </div>
        <div class="avatar">👤</div>
    </div>

    <!-- ACTIVITY SECTION -->
    <div class="activity-box">

        <h2>My Activity</h2>

        <div class="activity-grid">

            <!-- LOST CARD -->
            <div class="activity-card">
                <h3>Lost</h3>
                <p><b>Item:</b> Wallet</p>
                <p>Black leather wallet with ID cards inside</p>
            </div>

            <!-- FOUND CARD -->
            <div class="activity-card">
                <h3>Found</h3>
                <p><b>Item:</b> Water Bottle</p>
                <p>Blue bottle found near cafeteria</p>
            </div>

        </div>

    </div>

</div>

</body>
</html>
