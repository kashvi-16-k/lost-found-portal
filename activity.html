<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Activity</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="navbar">
        <h1>Lost &amp; Found Portal</h1>
        <div class="right-section">
            <p id="greeting"></p>
            <button onclick="location.href='dashboard.html';">Dashboard</button>
        </div>
    </div>

    <div class="account-wrapper">
        <div class="activity-box">
            <h2>My Activity</h2>
            <div class="user-details activity-header">
                <p><b>Name:</b> <span id="activityUserName">Student</span></p>
                <p><b>SAP ID:</b> <span id="activityUserSap">Not available</span></p>
            </div>

            <table class="activity-table">
                <thead>
                    <tr>
                        <th>Lost Items</th>
                        <th>Found Items</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td id="lostActivityList"></td>
                        <td id="foundActivityList"></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
