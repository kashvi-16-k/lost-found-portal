<!DOCTYPE html>
<html>
<head>
    <title>My Activity</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- NAVBAR -->
<div class="navbar">
    <h1>Lost & Found Portal</h1>
    <p>Hi, User</p>
</div>

<!-- MAIN CONTAINER -->
<div class="account-container">

    <!-- PROFILE CARD -->
    <div class="profile-card">
        <div class="profile-left">
            <h2>K</h2>
            <p>SAP ID: 123456</p>
        </div>

        <div class="profile-right">
            <div class="avatar">👤</div>
        </div>
    </div>

    <!-- ACTIVITY SECTION -->
    <div class="activity-section">
        <h2>My Activity</h2>

        <!-- SAMPLE ITEMS (STATIC) -->
        <div class="activity-item">
            <h3>Lost</h3>
            <p><b>Item:</b> Wallet</p>
            <p>Black leather wallet with ID cards inside</p>
        </div>

        <div class="activity-item">
            <h3>Found</h3>
            <p><b>Item:</b> Water Bottle</p>
            <p>Blue bottle found near cafeteria</p>
        </div>

    </div>

</div>

</body>
</html>
