<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Report Lost Item</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <form id="lostForm">
  <input type="text" id="item" placeholder="Item Name" required><br>
  <input type="text" id="description" placeholder="Description" required><br>
  <input type="text" id="location" placeholder="Location" required><br>
  <button type="submit">Submit</button>
</form>

<script src="script.js"></script>
    <div class="navbar">
        <h1>Lost &amp; Found Portal</h1>
        <div class="right-section">
            <p id="greeting"></p>
            <button onclick="location.href='dashboard.html';">Dashboard</button>
        </div>
    </div>

    <div class="container">
        <form id="lostForm">
            <h2>Report Lost Item</h2>

            <input type="text" id="lostItem" placeholder="Item Name" required>

            <select id="lostCategory" required>
                <option value="">Select Category</option>
                <option>Electronics</option>
                <option>Stationery</option>
                <option>ID/Cards</option>
                <option>Clothing</option>
                <option>Bags</option>
                <option>Keys</option>
                <option>Accessories</option>
                <option>Other</option>
            </select>

            <textarea id="lostDesc" placeholder="Enter short description" required></textarea>
            <input type="text" id="lostLocation" placeholder="Last Seen Location" required>
            <input type="date" id="lostDate" required>
            <input type="tel" id="lostPhone" maxlength="10" placeholder="Contact Number" required>
            <div class="file-row">
                <input type="file" id="foundImage">
                <span>Upload photo</span>
            </div>
            <button type="button" onclick="submitLost()">Submit</button>
        </form>
    </div>

    <script src="script.js"></script>
</body>
</html>
