<!DOCTYPE html>
<html>
<head>
    <title>Lost Item</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<form id="lostForm">
    <input type="text" id="item" placeholder="Item Name" required><br><br>
    <input type="text" id="desc" placeholder="Description" required><br><br>
    <input type="text" id="location" placeholder="Location" required><br><br>
    <button type="submit">Submit</button>
</form>

<div class="navbar">
    <h1>Lost & Found Portal</h1>
    <p id="greeting"></p>
</div>

<div class="container">
    <h2>Report Lost Item</h2>

    <input type="text" id="lostItem" placeholder="Item Name">

    <select id="lostCategory">
        <option>Select Category</option>
        <option>Electronics</option>
        <option>Stationery</option>
        <option>ID/Cards</option>
        <option>Clothing</option>
        <option>Bags</option>
        <option>Keys</option>
        <option>Accessories</option>
        <option>Other</option>
    </select>

    <textarea id="lostDesc" placeholder="💡 Be as detailed as possible! Include unique marks, serial numbers, or stickers."></textarea>

    <input type="text" placeholder="Last Seen Location">
    <input type="date">
    <input type="tel" placeholder="Contact Number">

    <div class="file-row">
        <input type="file">
        <span>(Optional) Upload photo</span>
    </div>

    <button onclick="submitLost()">Submit</button>
</div>

<script src="script.js"></script>
</body>
</html>
