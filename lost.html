<!DOCTYPE html>
<html>
<head>
    <title>Lost Item</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="navbar">
    <h1>Lost & Found Portal</h1>
    <p id="greeting"></p>
</div>

<div class="container">
    <form id="lostForm" class="container">

    <h2>Report Lost Item</h2>

    <input type="text" id="lostItem" placeholder="Item Name" required>

    <select id="lostCategory" required>
        <option value="">Select Category</option>
        <option>Electronics</option>
        <option>Stationery</option>
        <option>ID/Cards</option>
        <option>Clothing</option>
        <option>Bags</option>
        <option>Keys</option>
        <option>Accessories</option>
        <option>Other</option>
    </select>

    <textarea id="lostDesc"
        placeholder="💡 Be as detailed as possible! Include unique marks, serial numbers, or stickers."
        required></textarea>

    <input type="text" id="lostLocation" placeholder="Last Seen Location" required>

    <input type="date" id="lostDate" required>

    <input type="tel" id="lostPhone" maxlength="10"
        placeholder="Contact Number (10 digits)" required>

    <div class="file-row">
        <input type="file" id="lostImage">
        <span>(Optional) Upload photo</span>
    </div>

    <!-- IMPORTANT -->
    <button type="button" onclick="submitLost()">Submit</button>

</form>

<script src="script.js"></script>
</body>
</html>
